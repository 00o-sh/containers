# Trivy ignore policy. Consumed by aquasecurity/trivy-action via the
# `trivyignores:` input across the workflows in .github/workflows/.
#
# Mirrors .grype.yaml so the apps/ gate behaves consistently across
# both scanners. Trivy honors `expired_at` natively (after the date,
# the ignore is dropped and the CVE re-fails the gate).
#
# See .grype.yaml for the full rationale and grouping. Entries here
# are the minimum needed to keep the gate in sync.

