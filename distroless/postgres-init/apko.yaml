contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    # Built by the melange.yaml next to this file from the repo-local
    # src/ Go shim; pulls postgresql-18-client via its runtime
    # dependency. Note the image version tracks the shim (1.x), not the
    # postgres release — different axis than apps/postgres-init, which
    # versioned on the base image tag.
    - postgres-init

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

# Configuration is entirely env-driven (INIT_POSTGRES_*), same contract
# as apps/postgres-init. Optional seed SQL is read from
# /initdb/<dbname>.sql — mount it like before. Runs once and exits;
# intended as a k8s initContainer.
entrypoint:
  command: /usr/bin/postgres-init

environment:
  LANG: C.UTF-8

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/00o-sh/containers
  org.opencontainers.image.url: https://github.com/00o-sh/containers/tree/main/distroless/postgres-init
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.description: PostgreSQL role/database init container (distroless / Wolfi)
