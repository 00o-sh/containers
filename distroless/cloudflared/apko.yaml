contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    # Built from source by the melange.yaml next to this file (see its
    # header for why we no longer consume Wolfi's chronically-lagging
    # apk). Version is Renovate-managed there; the local package
    # outranks Wolfi's same-named apk in the appended repository.
    - cloudflared

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/cloudflared

cmd: tunnel --no-autoupdate run

environment:
  LANG: C.UTF-8
  TUNNEL_LOGLEVEL: info

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/00o-sh/containers
  org.opencontainers.image.url: https://github.com/cloudflare/cloudflared
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.description: Cloudflare Tunnel client (distroless / Wolfi)
