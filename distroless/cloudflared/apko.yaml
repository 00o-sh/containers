contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    # >= floor is the Renovate-managed value; the resolver floats upward
    # within it so the daily cron still delivers Wolfi -rN CVE rebuilds
    # without a PR. If Wolfi lags upstream, the bump PR fails apk
    # resolution and sits red until Wolfi catches up.
    - cloudflared>=2026.5.2 # renovate: datasource=github-releases depName=cloudflare/cloudflared

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/cloudflared

cmd: tunnel --no-autoupdate run

environment:
  LANG: C.UTF-8
  TUNNEL_LOGLEVEL: info

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/00o-sh/containers
  org.opencontainers.image.url: https://github.com/cloudflare/cloudflared
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.description: Cloudflare Tunnel client (distroless / Wolfi)
