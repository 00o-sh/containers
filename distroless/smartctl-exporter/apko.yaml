contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    # The exporter shells out to /usr/sbin/smartctl at scrape time.
    - smartmontools
    # Built by the melange.yaml next to this file (Wolfi doesn't ship
    # the exporter). Version is Renovate-managed there.
    - smartctl-exporter

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

# No `cmd:` — flags (e.g. --smartctl.interval, --web.listen-address) go
# via args, same as apps/smartctl-exporter's bare-binary ENTRYPOINT.
# Reading disks needs device access granted by the orchestrator
# (--device / volumes + capabilities), identical to the apps/ flavor;
# without it the exporter still serves /metrics and logs a warning.
entrypoint:
  command: /usr/bin/smartctl_exporter

environment:
  LANG: C.UTF-8

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/00o-sh/containers
  org.opencontainers.image.url: https://github.com/prometheus-community/smartctl_exporter
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.description: Prometheus smartctl exporter (distroless / Wolfi)
