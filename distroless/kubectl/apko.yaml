contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    # Wolfi publishes kubectl as one apk per minor version
    # (kubectl-1.24 through kubectl-1.36 available). Pinned to 1.36
    # (latest as of 2026-05). Bump to kubectl-1.37 (etc.) when Wolfi
    # ships it and the operator's cluster control plane rolls.
    #
    # Both packages required:
    # - kubectl-1.36:         ships /usr/bin/kubectl-1.36 (versioned binary)
    # - kubectl-1.36-default: ships /usr/bin/kubectl alias → kubectl-1.36
    # Our entrypoint uses the unversioned path, so -default is what
    # makes /usr/bin/kubectl exist in the image.
    - kubectl-1.36
    - kubectl-1.36-default

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/kubectl

environment:
  LANG: C.UTF-8

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/00o-sh/containers
  org.opencontainers.image.url: https://github.com/kubernetes/kubernetes
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.description: kubectl CLI (distroless / Wolfi); pinned to Kubernetes 1.36.
