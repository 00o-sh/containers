contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    # Wolfi publishes kubectl as one apk per minor version
    # (kubectl-1.24 through kubectl-1.36 available). Pinned to 1.35
    # to match the operator's cluster k8s version. Bump to
    # kubectl-1.36 (etc.) when the cluster's control plane rolls.
    - kubectl-1.35

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

entrypoint:
  command: /usr/bin/kubectl

environment:
  LANG: C.UTF-8

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/00o-sh/containers
  org.opencontainers.image.url: https://github.com/kubernetes/kubernetes
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.description: kubectl CLI (distroless / Wolfi); pinned to Kubernetes 1.35.
