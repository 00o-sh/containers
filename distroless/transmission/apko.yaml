contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    # Torrent-done tooling parity with apps/transmission. Note the
    # shell-free caveat: script-torrent-done hooks must be direct
    # executables, not shell scripts (same caveat class as
    # k8s-sidecar's SCRIPT hook) — these binaries remain available to
    # such executables.
    - 7zip
    # Built by the melange.yaml next to this file: daemon + cli/utils +
    # web UI + transmission-init shim + unrar. Version is
    # Renovate-managed there.
    - transmission

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: "65532"

# transmission-init renders /config/settings.json from TRANSMISSION__*
# env vars (same contract as apps/transmission's entrypoint.sh, with
# its invalid-JSON template rendering fixed) and execs
# transmission-daemon --foreground --config-dir /config
# --log-level $TRANSMISSION_LOG_LEVEL. Extra args pass through to the
# daemon, exactly like the old entrypoint's "$@".
entrypoint:
  command: /usr/bin/transmission-init

environment:
  LANG: C.UTF-8
  HOME: /config
  XDG_CONFIG_HOME: /config
  XDG_DATA_HOME: /config
  TRANSMISSION_WEB_HOME: /usr/share/transmission/public_html

paths:
  - path: /config
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.source: https://github.com/00o-sh/containers
  org.opencontainers.image.url: https://github.com/transmission/transmission
  org.opencontainers.image.licenses: GPL-2.0-or-later
  org.opencontainers.image.description: Transmission BitTorrent daemon with web UI (distroless / Wolfi)
