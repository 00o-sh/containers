package:
  name: tqm
  version: "1.19.0"
  epoch: 0
  description: Torrent Queue Manager — opinionated bulk media-server torrent helper.
  copyright:
    - license: GPL-3.0-or-later

environment:
  contents:
    # See STATE.md thread #10 for the full pattern: build + test envs
    # each need their own repositories+keyring (Wolfi's CI provides them
    # implicitly for in-tree recipes; ours has to spell them out).
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.24

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/autobrr/tqm
      tag: v${{package.version}}
      # Note: this is the commit SHA the tag points at, NOT the tag
      # object's own SHA. Annotated tags have a separate object SHA;
      # git-checkout warned about this when we used the tag-object hash
      # in the first push. Use `git rev-list -n1 <tag>` to find this.
      expected-commit: d451f169959ab81ce143f9e0e9c4e5abb6856699

  - runs: |
      # Main package lives at cmd/tqm (root has no .go files — it's a
      # library + cmd/ cobra subcommands + cmd/tqm/main.go).
      # ldflag targets follow tqm's .goreleaser.yml convention:
      # github.com/autobrr/tqm/pkg/runtime.{Version,GitCommit,Timestamp}.
      mkdir -p "${{targets.destdir}}/usr/bin"
      LDFLAGS="-s -w \
        -X github.com/autobrr/tqm/pkg/runtime.Version=${{package.version}} \
        -X github.com/autobrr/tqm/pkg/runtime.GitCommit=$(git rev-parse --short HEAD) \
        -X github.com/autobrr/tqm/pkg/runtime.Timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags "$LDFLAGS" \
        -o "${{targets.destdir}}/usr/bin/tqm" \
        ./cmd/tqm

  - uses: strip

test:
  environment:
    contents:
      repositories:
        - https://packages.wolfi.dev/os
      keyring:
        - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
      packages:
        - busybox
        - ca-certificates-bundle
  pipeline:
    - runs: |
        tqm --version
