---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate

# Temporarily disabled in this fork: dispatches Renovate via the
# home-operations/.github org runner, which requires BOT_CLIENT_ID /
# BOT_APP_PRIVATE_KEY secrets that aren't configured here. While
# disabled, no Renovate runs fire for this fork — base-image and
# package bumps stop arriving organically. Re-enable by restoring the
# `push:` trigger (or by wiring a self-hosted Renovate path).
# Tracked in .claude/STATE.md.
on:
  workflow_dispatch:

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Renovate
        id: dispatch
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          RUN_URL=$(gh workflow run renovate.yaml \
            --repo "${{ github.repository_owner }}/.github" \
            --ref main \
            --field "autodiscoverFilter=${{ github.event.repository.name }}")
          echo "run_id=${RUN_URL##*/}" >> "$GITHUB_OUTPUT"

      - name: Await Renovate Completion
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          gh run watch \
            --repo "${{ github.repository_owner }}/.github" \
            "${{ steps.dispatch.outputs.run_id }}" \
            --exit-status

      - name: Renovate Output
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          gh run view \
            --repo "${{ github.repository_owner }}/.github" \
            --log "${{ steps.dispatch.outputs.run_id }}"
