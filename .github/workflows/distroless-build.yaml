---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Distroless Build

on:
  push:
    branches: [main]
    paths:
      - distroless/**
      - .github/workflows/distroless-build.yaml
  pull_request:
    paths:
      - distroless/**
      - .github/workflows/distroless-build.yaml
  schedule:
    # Daily rebuild to pull fresh Wolfi CVE patches.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      image:
        type: string
        description: Image name under distroless/ (blank = all)
        required: false

concurrency:
  group: distroless-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write
  pull-requests: write

env:
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  MELANGE_VERSION: v0.52.0 # renovate: datasource=github-releases depName=chainguard-dev/melange
  # Renovate will pin a digest (`@sha256:...`) on first run via pinDigests.
  APKO_IMAGE: ghcr.io/wolfi-dev/sdk:latest # renovate: datasource=docker depName=ghcr.io/wolfi-dev/sdk

jobs:
  discover:
    name: Discover Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set.outputs.images }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Only run changed-files detection on PR/push events. For schedule
      # (daily CVE rebuild) and workflow_dispatch we want every image
      # rebuilt regardless of git diff. Mirrors apps/'s release.yaml.
      - name: Get changed distroless dirs
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        id: changed-files
        with:
          path: distroless
          include_only_directories: true
          max_depth: 1

      - name: Resolve image list
        id: set
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE: ${{ inputs.image }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
        run: |
          set -euo pipefail

          # Decision tree:
          # 1. workflow_dispatch with input.image → just that one
          # 2. workflow_dispatch w/o input, or schedule → all
          #    (operator explicitly wants full rebuild, or daily CVE cycle)
          # 3. pull_request / push:
          #    a. distroless/<dir>/ changed → just those dirs
          #    b. only the workflow itself changed (no dirs in path filter
          #       matched) → all images (workflow changes can break any
          #       image; test them all)

          all_images() {
            find distroless -maxdepth 2 -name apko.yaml -printf '%h\n' \
              | sed 's|^distroless/||' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          }

          if [ -n "$INPUT_IMAGE" ]; then
            images_json=$(jq -nc --arg i "$INPUT_IMAGE" '[$i]')
          elif [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            images_json=$(all_images)
          elif [ -n "$CHANGED_FILES" ] && [ "$CHANGED_FILES" != "[]" ]; then
            images_json="$CHANGED_FILES"
          else
            # PR/push but no distroless/ dirs changed → workflow itself
            # was the only thing modified. Validate against all images.
            images_json=$(all_images)
          fi

          echo "images=$images_json" >> "$GITHUB_OUTPUT"
          if [ "$images_json" = "[]" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered: $images_json"

  build:
    name: Build (${{ matrix.image }} / ${{ matrix.arch }})
    needs: discover
    if: ${{ needs.discover.outputs.any == 'true' }}
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect melange recipe
        id: melange
        shell: bash
        # We only build a local apk via melange when Wolfi doesn't already
        # ship the app at a version we want. Otherwise apko consumes the
        # Wolfi-provided package directly.
        run: |
          if [ -f "distroless/${{ matrix.image }}/melange.yaml" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install melange
        if: steps.melange.outputs.present == 'true'
        uses: chainguard-dev/actions/setup-melange@9978bf17926f53444b5eff45479954d94ec12e32 # v1.6.24
        with:
          version: ${{ env.MELANGE_VERSION }}

      - name: Generate ephemeral signing key
        if: steps.melange.outputs.present == 'true'
        run: melange keygen melange.rsa

      - name: melange build
        if: steps.melange.outputs.present == 'true'
        run: |
          melange build "distroless/${{ matrix.image }}/melange.yaml" \
            --arch "${{ matrix.arch }}" \
            --signing-key melange.rsa \
            --out-dir packages

      - name: melange test
        if: steps.melange.outputs.present == 'true'
        # Test runs in a sandbox where extra tools (busybox, etc.) are allowed.
        # The final apko image stays bare.
        run: |
          melange test "distroless/${{ matrix.image }}/melange.yaml" \
            --arch "${{ matrix.arch }}" \
            --keyring-append melange.rsa.pub \
            --source-dir packages

      - name: apko build
        uses: chainguard-images/actions/apko-build@a63bd73b7ab5cb3ae175d81ab9b72e4922af3acd # v1.0.32
        with:
          apko-image: ${{ env.APKO_IMAGE }}
          config: distroless/${{ matrix.image }}/apko.yaml
          tag: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless:verify-${{ matrix.arch }}
          archs: ${{ matrix.arch }}
          keyring-append: ${{ steps.melange.outputs.present == 'true' && format('{0}/melange.rsa.pub', github.workspace) || '' }}
          repository-append: ${{ steps.melange.outputs.present == 'true' && format('{0}/packages', github.workspace) || '' }}

      - name: Image structure assertions
        shell: bash
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless:verify-${{ matrix.arch }}"

          echo "::group::Load image into docker"
          docker load -i output.tar
          # apko's single-arch build appends `-<docker_arch>` to the tag on
          # load (x86_64→amd64, aarch64→arm64). Re-tag to the clean name so
          # downstream steps can reference IMG without arch-suffix gymnastics.
          case "${{ matrix.arch }}" in
            x86_64)  loaded_suffix=amd64 ;;
            aarch64) loaded_suffix=arm64 ;;
            *) echo "::error::Unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          docker tag "${IMG}-${loaded_suffix}" "${IMG}"
          echo "::endgroup::"

          echo "::group::Must run as non-root"
          user=$(docker inspect "$IMG" --format='{{.Config.User}}')
          if [ -z "$user" ] || [ "$user" = "0" ] || [ "$user" = "root" ]; then
            echo "::error::Image user is '$user' (expected non-root)"
            exit 1
          fi
          echo "user=$user OK"
          echo "::endgroup::"

          echo "::group::Must not ship a shell"
          if tar tf output.tar | grep -E '(^|/)(bin|usr/bin|usr/local/bin)/(sh|bash|ash|busybox|dash)$'; then
            echo "::error::Shell binary present in final image"
            exit 1
          fi
          echo "no shell OK"
          echo "::endgroup::"

          echo "::group::Entrypoint must exist"
          entrypoint=$(docker inspect "$IMG" --format='{{json .Config.Entrypoint}}')
          echo "entrypoint=$entrypoint"
          if [ "$entrypoint" = "null" ] || [ "$entrypoint" = "[]" ]; then
            echo "::error::No entrypoint set"
            exit 1
          fi
          echo "::endgroup::"

      - name: Setup Go (for boot smoke)
        # Use actions/setup-go directly instead of jdx/mise-action: mise
        # tries to fetch version info for every tool in .mise.toml (apko,
        # melange, cosign, claude-code, tmux, etc.) on first run, and on
        # the aarch64 runner the mise cache is empty → anonymous GitHub
        # API calls → 401 rate-limit fail. setup-go is targeted: only
        # installs Go (which is all the boot-smoke test needs) and has
        # its own caching.
        if: hashFiles(format('distroless/{0}/container_test.go', matrix.image)) != ''
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Boot smoke (${{ matrix.image }})
        # Per-image smoke runs distroless/<image>/container_test.go via the
        # testhelpers package (testcontainers-go). Tests live next to the
        # recipe; this workflow is generic. To add a new image: drop a
        # container_test.go alongside apko.yaml — no workflow edit needed.
        # Mirrors the apps/ track (see .github/actions/app-tests/).
        if: hashFiles(format('distroless/{0}/container_test.go', matrix.image)) != ''
        shell: bash
        env:
          # testhelpers.GetTestImage reads TEST_IMAGE; falls back to the
          # `:rolling` tag if unset. Override to the just-built sandbox so
          # we test what this PR produces, not what's already published.
          TEST_IMAGE: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless:verify-${{ matrix.arch }}
        run: |-
          go test -v ./distroless/${{ matrix.image }}/...

      - name: Warn if no boot smoke for ${{ matrix.image }}
        if: hashFiles(format('distroless/{0}/container_test.go', matrix.image)) == ''
        shell: bash
        run: |
          echo "::warning::No distroless/${{ matrix.image }}/container_test.go found; skipping boot smoke. Drop a Go test next to apko.yaml to enable."

      - name: Compute Grype cache key
        id: grype-key
        shell: bash
        run: echo "key=grype-db-$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Restore Grype DB cache
        id: grype-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ steps.grype-key.outputs.key }}
          path: ~/.cache/grype/db

      - name: Grype scan (fail on HIGH+)
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless:verify-${{ matrix.arch }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: sarif
          # Shared ignore policy with apps/. Distroless images shouldn't
          # carry the listed CVEs (they don't bundle upstream-vendored
          # libs), but apply the same config for consistency.
          config: .grype.yaml

      - name: Upload Grype SARIF to Security tab
        if: always() && steps.grype.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ matrix.image }}-distroless-${{ matrix.arch }}

      - name: Trivy scan (second opinion, fail on HIGH+)
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless:verify-${{ matrix.arch }}
          format: sarif
          output: trivy-${{ matrix.arch }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          hide-progress: true
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy SARIF to Security tab
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.arch)) != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.arch }}.sarif
          category: trivy-${{ matrix.image }}-distroless-${{ matrix.arch }}

      - name: Render CVE scan summary
        # Aggregate both scanners' findings into a per-image summary.
        # Only render once per image (from x86_64) — package set is
        # identical across arches in apko-built images, so the aarch64
        # SARIFs are redundant for human display (still uploaded to
        # Security tab with distinct categories).
        if: always() && matrix.arch == 'x86_64'
        id: cve_summary
        shell: bash
        run: |
          set +e
          count_sarif() {
            local f="$1"
            [ -f "$f" ] || { echo 0; return; }
            jq '[.runs[].results // []] | flatten | length' "$f" 2>/dev/null || echo 0
          }
          grype_count=$(count_sarif "${{ steps.grype.outputs.sarif }}")
          trivy_count=$(count_sarif "trivy-${{ matrix.arch }}.sarif")
          repo_url="${{ github.server_url }}/${{ github.repository }}"

          {
            echo "### CVE scan — \`${{ matrix.image }}-distroless\`"
            echo
            echo "| Scanner | HIGH+ fixable |"
            echo "|---|---|"
            echo "| Grype | $grype_count |"
            echo "| Trivy | $trivy_count |"
            echo
            echo "Full findings: [Security tab]($repo_url/security/code-scanning?query=is%3Aopen+ref%3Arefs%2Fheads%2F${{ github.head_ref || github.ref_name }})"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "grype=$grype_count"
            echo "trivy=$trivy_count"
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment with CVE summary
        if: always() && github.event_name == 'pull_request' && matrix.arch == 'x86_64'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: distroless-cve-scan-${{ matrix.image }}
          message: |
            ### CVE scan — `${{ matrix.image }}-distroless`

            | Scanner | HIGH+ fixable |
            |---|---|
            | Grype | ${{ steps.cve_summary.outputs.grype }} |
            | Trivy | ${{ steps.cve_summary.outputs.trivy }} |

            Both scanners gate on `CRITICAL,HIGH` + `--only-fixed`. Build fails if either reports >0.

            Full findings live in the [Security tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning) under categories `grype-${{ matrix.image }}-distroless-*` and `trivy-${{ matrix.image }}-distroless-*`.

      - name: Log in to GHCR
        # Now logs in for both PR and main runs — PRs push :verify-<arch>
        # intermediates so the manifest job can combine them into :sandbox
        # for pre-merge testing.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push arch-specific image
        shell: bash
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless:verify-${{ matrix.arch }}"
          docker push "$IMG"

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.image }}-${{ matrix.arch }}
          path: sbom-*.spdx.json
          if-no-files-found: warn
          retention-days: 7

  manifest:
    name: Publish Multi-Arch Manifest (${{ matrix.image }})
    needs:
      - discover
      - build
    if: ${{ needs.discover.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download SBOM (x86_64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-${{ matrix.image }}-x86_64

      - name: Resolve image version from SBOM
        id: ver
        shell: bash
        # Read the upstream-app version from the apko-emitted SBOM. Works
        # whether the apk came from Wolfi directly or from a local melange
        # build; the SBOM is the single source of truth for what's actually
        # in the image.
        #
        # Match strategy: prefer an exact name match (the common case —
        # `cloudflared`, `kopia`, `tqm` all have apk names equal to the
        # distroless dir name). Fall back to a hyphen-prefix match for
        # apks Wolfi ships per-minor with a version suffix (e.g.
        # `kubectl-1.36`, `kubectl-1.36-default`). `head -1` deterministically
        # picks the SBOM-first match, which is the order the package list
        # in apko.yaml dictates — so the "main" versioned package wins
        # over the `-default` alias.
        run: |
          set -euo pipefail
          raw=$(jq -r --arg name "${{ matrix.image }}" \
            '.packages[] | select(.name == $name or (.name | startswith($name + "-"))) | .versionInfo' \
            sbom-x86_64.spdx.json | head -1)
          if [ -z "$raw" ] || [ "$raw" = "null" ]; then
            echo "::error::Could not find package matching '${{ matrix.image }}' (exact or prefix) in SBOM"
            exit 1
          fi
          # Strip apk -rN release suffix to produce a semver-shaped tag
          # (e.g. "2026.5.0-r1" → "2026.5.0").
          upstream=${raw%-r[0-9]*}
          echo "raw=$raw" >> "$GITHUB_OUTPUT"
          echo "version=$upstream" >> "$GITHUB_OUTPUT"
          echo "Resolved: $raw → $upstream"

      - name: Detect semver shape
        # Most upstream versions are semver-shaped (e.g. 2026.5.0) but a
        # few (busybox 1.37.0, jackett 0.24.1870) may have unusual
        # patterns. metadata-action's semver type requires a valid
        # semver — fall back to type=raw if the version doesn't parse.
        id: semver
        shell: bash
        run: |
          v="${{ steps.ver.outputs.version }}"
          if [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image metadata (tag set)
        # Mirrors app-builder.yaml's tag scheme so distroless images
        # follow the repo's semantic-versioning mission (README §Tag
        # Immutability + Mission Statement). Generates :<version>,
        # :<major>.<minor>, :<major>, :rolling for releases; :sandbox
        # for PRs. flavor: latest=false because users pin by digest.
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          flavor: latest=false
          images: |
            ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ver.outputs.version }},enable=${{ steps.semver.outputs.valid == 'true' && github.event_name != 'pull_request' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ver.outputs.version }},enable=${{ steps.semver.outputs.valid == 'true' && github.event_name != 'pull_request' }}
            type=semver,pattern={{major}},value=${{ steps.ver.outputs.version }},enable=${{ steps.semver.outputs.valid == 'true' && github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.ver.outputs.version }},enable=${{ steps.semver.outputs.valid != 'true' && github.event_name != 'pull_request' }}
            type=raw,value=rolling,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=sandbox,enable=${{ github.event_name == 'pull_request' }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push manifest
        id: manifest
        shell: bash
        # Iterate the tag list produced by metadata-action so every
        # tag (full semver, major.minor, major, rolling) points at the
        # same multi-arch digest.
        run: |
          set -euo pipefail
          NS="${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}-distroless"
          tag_args=()
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            tag_args+=(--tag "$ref")
          done <<< "${{ steps.meta.outputs.tags }}"
          docker buildx imagetools create "${tag_args[@]}" \
            "$NS:verify-x86_64" \
            "$NS:verify-aarch64"
          # Use the first (primary) tag to resolve the digest — they
          # all point at the same manifest list.
          primary_ref="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -1)"
          digest=$(docker buildx imagetools inspect "$primary_ref" \
            --format '{{ json .Manifest }}' | jq -r '.digest')
          echo "namespace=$NS" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "primary_ref=$primary_ref" >> "$GITHUB_OUTPUT"
          {
            echo "## ${{ matrix.image }}-distroless published"
            echo
            echo "**Digest:** \`$digest\`"
            echo
            echo "**Tags pushed:**"
            echo
            echo '```'
            printf '%s\n' "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Pullable as \`$NS:sandbox@$digest\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate provenance attestation
        # Replaces the previous cosign-by-tag/digest path with the
        # GitHub-native attest action used elsewhere in this repo. The
        # attestation is verifiable via `gh attestation verify` and is
        # pushed alongside the image in the registry.
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          push-to-registry: true
          subject-name: ${{ steps.manifest.outputs.namespace }}
          subject-digest: ${{ steps.manifest.outputs.digest }}

      - name: Verify attestation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |-
          gh attestation verify --repo ${{ github.repository }} \
            "oci://${{ steps.manifest.outputs.namespace }}@${{ steps.manifest.outputs.digest }}"

      - name: Compute image size diff vs :rolling
        # Distroless's primary value-add over Alpine/Ubuntu is image
        # footprint, so we surface a size delta on every PR. Baseline
        # is the current :rolling tag; comparator is :sandbox (this
        # PR's build). First-ever PR has no :rolling — continue-on-error
        # lets the comment fall back to "no baseline yet" gracefully.
        if: github.event_name == 'pull_request'
        id: size_diff
        continue-on-error: true
        uses: ./.github/actions/app-size-diff
        with:
          from-app: ${{ steps.manifest.outputs.namespace }}:rolling
          to-app: ${{ steps.manifest.outputs.namespace }}:sandbox

      - name: Post sticky PR comment with sandbox pull ref + size diff
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: distroless-sandbox-${{ matrix.image }}
          message: |
            ### 🧪 Sandbox image — `${{ matrix.image }}-distroless`

            Build of this PR is pullable as:

            ```
            ${{ steps.manifest.outputs.namespace }}:sandbox@${{ steps.manifest.outputs.digest }}
            ```

            Provenance attestation pushed; verify locally with:

            ```
