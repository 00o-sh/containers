---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: App Builder

on:
  workflow_call:
    inputs:
      app:
        type: string
        description: App Name
        required: true
      release:
        type: boolean
        description: Release
        required: true

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      app-exists: ${{ steps.app-exists.outputs.exists }}
      platforms: ${{ steps.app-options.outputs.platforms }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check For Existing App
        uses: ./.github/actions/app-exists
        id: app-exists
        with:
          app: ${{ inputs.app }}

      - name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Get App Versions
        uses: ./.github/actions/app-versions
        id: app-versions
        with:
          upstream-version: ${{ steps.app-options.outputs.version }}

      - name: Build App Metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          flavor: latest=false
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.app-options.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.app-versions.outputs.semantic }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.app-versions.outputs.semantic }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=semver,pattern={{major}},value=${{ steps.app-versions.outputs.semantic }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=raw,value=${{ steps.app-versions.outputs.raw }},enable=${{ steps.app-versions.outputs.is-valid-semver && inputs.release }}
            type=raw,value=rolling,enable=${{ inputs.release }}
            type=raw,value=sandbox,enable=${{ ! inputs.release }}

      - name: Upload Bake Metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.app }}-bake-metadata
          path: ${{ steps.meta.outputs.bake-file }}
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build (${{ matrix.platform }})
    needs:
      - plan
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.plan.outputs.platforms) }}
    runs-on: ${{ startsWith(matrix.platform, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get Target Architecture
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: target
        with:
          script: |-
            core.setOutput('arch', '${{ matrix.platform }}'.split('/').pop());

      - name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download Bake Metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.app }}-bake-metadata
          path: ${{ runner.temp }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Add Include Directory to Build Context
        run: |-
          rsync -a --ignore-existing --progress ./include/ ./apps/${{ inputs.app }}/

      - name: Build App
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        id: bake
        with:
          files: |
            ./docker-bake.hcl
            cwd://${{ runner.temp }}/docker-metadata-action-bake.json
          set: |
            *.args.VENDOR=${{ github.repository_owner }}
            *.cache-from=${{ format('type=registry,ref=ghcr.io/{0}/build_cache:{1}-{2},mode=max', github.repository_owner, inputs.app, steps.target.outputs.arch) }}
            *.cache-to=${{ inputs.release && format('type=registry,ref=ghcr.io/{0}/build_cache:{1}-{2},mode=max,compression=zstd,force-compression=true', github.repository_owner, inputs.app, steps.target.outputs.arch) || '' }}
            *.labels.org.opencontainers.image.title=${{ steps.app-options.outputs.image_name }}
            *.labels.org.opencontainers.image.url=https://ghcr.io/${{ github.repository_owner }}/${{ steps.app-options.outputs.image_name }}
            *.labels.org.opencontainers.image.version=${{ steps.app-options.outputs.version }}
            *.labels.org.opencontainers.image.revision=${{ github.sha }}
            *.labels.org.opencontainers.image.vendor=${{ github.repository_owner }}
            *.output=type=image,name=ghcr.io/${{ github.repository_owner }}/${{ steps.app-options.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true,compression=zstd,force-compression=true
            *.platform=${{ matrix.platform }}
            *.tags=
          source: ./apps/${{ inputs.app }}
          targets: image

      - name: Export Digest
        run: |-
          mkdir -p ${{ runner.temp }}/digests
          DIGEST="${{ fromJSON(steps.bake.outputs.metadata).image['containerimage.digest'] }}"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload Digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.app }}-digests-${{ steps.target.outputs.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge
    runs-on: ubuntu-latest
    needs:
      - build
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      image_name: ${{ steps.app-options.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Download Bake Metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.app }}-bake-metadata
          path: ${{ runner.temp }}

      - name: Download Digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: ${{ inputs.app }}-digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Manifest List and Push
        working-directory: ${{ runner.temp }}/digests
        run: |-
          docker buildx imagetools create \
              $(jq --raw-output --compact-output '.target."docker-metadata-action".tags | map(select(startswith("ghcr.io/${{ github.repository_owner }}/${{ steps.app-options.outputs.image_name }}")) | "-t " + .) | join(" ")' ${{ runner.temp }}/docker-metadata-action-bake.json) \
              $(printf 'ghcr.io/${{ github.repository_owner }}/${{ steps.app-options.outputs.image_name }}@sha256:%s ' *)

      - name: Inspect Image
        run: |-
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ steps.app-options.outputs.image_name }}:$(jq --raw-output '.target."docker-metadata-action".args.DOCKER_META_VERSION' ${{ runner.temp }}/docker-metadata-action-bake.json)

      - name: Export Digest
        id: digest
        run: |-
          TAG=$(jq --raw-output '.target."docker-metadata-action".args.DOCKER_META_VERSION' ${{ runner.temp }}/docker-metadata-action-bake.json)
          DIGEST=$(docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/${{ steps.app-options.outputs.image_name }}:${TAG} --format '{{ json . }}' | jq --raw-output '.manifest.digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

  attest:
    name: Attest
    needs:
      - merge
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Upload Dependency Snapshot
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          dependency-snapshot: true
          image: ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}@${{ needs.merge.outputs.digest }}

      - name: Attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          push-to-registry: true
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}
          subject-digest: ${{ needs.merge.outputs.digest }}

      - name: Verify Attestation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |-
          gh attestation verify --repo ${{ github.repository }} oci://ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}@${{ needs.merge.outputs.digest }}

  scan:
    name: CVE Scan (${{ inputs.app }})
    needs:
      - merge
      - attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compute Grype cache key
        id: grype-key
        shell: bash
        run: echo "key=grype-db-$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Restore Grype DB cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: ${{ steps.grype-key.outputs.key }}
          path: ~/.cache/grype/db

      - name: Grype scan (report only)
        # Apps track is legacy/dormant; only cloudflared-distroless is
        # consumed downstream. The CVE gate progression on apps/:
        # 1. #13: HIGH+ → CRITICAL (still gating)
        # 2. #22: time-bounded ignores for 24 upstream-vendored clusters
        # 3. now: report-only — SARIF + sticky comment still surface
        #    findings, but the gate no longer blocks merges. Most apps/
        #    CVEs are upstream-vendored and not patchable from this
        #    pipeline; gating dormant images on them was operational
        #    noise. Distroless gate (distroless-build.yaml) remains
        #    strict HIGH+ — that's where the security floor lives.
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}@${{ needs.merge.outputs.digest }}
          fail-build: false
          severity-cutoff: critical
          only-fixed: true
          output-format: sarif
          # .grype.yaml ignores still apply; with fail-build=false they
          # mainly reduce SARIF/Security-tab noise rather than gating.
          config: .grype.yaml

      - name: Upload Grype SARIF
        if: always() && steps.grype.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-${{ needs.merge.outputs.image_name }}

      - name: Trivy scan (second opinion, report only)
        # Matches the Grype mode above — report-only on apps/. Both
        # scanners surface findings to SARIF and the sticky comment
        # without blocking merges. Distroless workflow stays gating.
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}@${{ needs.merge.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          hide-progress: true
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ needs.merge.outputs.image_name }}

      - name: Render CVE summary
        if: always()
        id: cve_summary
        shell: bash
        run: |
          set +e
          count_sarif() {
            local f="$1"
            [ -f "$f" ] || { echo 0; return; }
            jq '[.runs[].results // []] | flatten | length' "$f" 2>/dev/null || echo 0
          }
          grype_count=$(count_sarif "${{ steps.grype.outputs.sarif }}")
          trivy_count=$(count_sarif "trivy.sarif")
          {
            echo "grype=$grype_count"
            echo "trivy=$trivy_count"
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment with CVE summary
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cve-scan-${{ inputs.app }}
          message: |
            ### CVE scan — `${{ needs.merge.outputs.image_name }}`

            | Scanner | CRITICAL fixable |
            |---|---|
            | Grype | ${{ steps.cve_summary.outputs.grype }} |
            | Trivy | ${{ steps.cve_summary.outputs.trivy }} |

            **Report-only on `apps/`** — both scanners surface findings without blocking the merge. Most apps/ CVEs are in upstream-vendored libraries that can't be patched from this build pipeline, and only `cloudflared-distroless` is consumed downstream so dormant-image CVEs aren't operationally urgent. Distroless images keep the strict HIGH+ gate. See `.claude/STATE.md` for the full progression and rationale.

            Full findings: [Security tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning) under categories `grype-${{ needs.merge.outputs.image_name }}` / `trivy-${{ needs.merge.outputs.image_name }}`.

  test:
    if: ${{ ! inputs.release }}
    name: Test
    needs:
      - merge
      - attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect bot-app secret
        # Forks (this one included) may not have a BOT_APP GitHub App
        # configured. Detect and fall back to github.token so the
        # test/announce paths work without it.
        id: bot
        env:
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
        run: |
          if [ -n "$BOT_APP_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Token
        if: steps.bot.outputs.configured == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Run App Tests
        uses: ./.github/actions/app-tests
        with:
          app: ${{ inputs.app }}
          image: ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}@${{ needs.merge.outputs.digest }}
          token: ${{ github.token }}

      - name: Get App Size Diff
        uses: ./.github/actions/app-size-diff
        id: app-size-diff
        with:
          from-app: ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}:rolling
          to-app: ghcr.io/${{ github.repository_owner }}/${{ needs.merge.outputs.image_name }}:sandbox

      - name: Post App Size Diff
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          header: app-size-diff-${{ inputs.app }}
          message: |
            ${{ steps.app-size-diff.outputs.size-diff-markdown }}

  announce:
    if: ${{ inputs.release && needs.plan.outputs.app-exists != 'true' }}
    name: Announce
    needs:
      - plan
      - attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect bot-app secret
        id: bot
        env:
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
        run: |
          if [ -n "$BOT_APP_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Token
        if: steps.bot.outputs.configured == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Get Release Tag
        uses: ./.github/actions/release-tag
        id: release
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Create Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          body: |
            > [!NOTE]
            > A new app has been added.

            ## 📦 App

            **Name**: [${{ steps.app-options.outputs.image_name }}](https://github.com/${{ github.repository }}/pkgs/container/${{ steps.app-options.outputs.image_name }})
            **Source**: <${{ steps.app-options.outputs.source }}>
          tag: ${{ steps.release.outputs.tag }}
          token: ${{ steps.app-token.outputs.token || github.token }}

  notify:
    if: ${{ inputs.release && !cancelled() }}
    needs:
      - plan
      - build
      - merge
      - attest
      - announce
    name: Notify
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') }}
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - if: ${{ contains(needs.*.result, 'failure') }}
        name: Get App Options
        uses: ./.github/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - if: ${{ contains(needs.*.result, 'failure') }}
        name: Send Discord Webhook
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          color: "0xFF0000"
          description: |
            App: `${{ inputs.app }}`
            Version: `${{ steps.app-options.outputs.version }}`
            [Rebuild](${{ github.server_url }}/${{ github.repository }}/actions/workflows/release.yaml)
          nodetail: true
          title: App build failed
          username: GitHub Actions
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
